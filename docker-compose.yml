# Pilha local: API + Web + Postgres. Este compose usa Orthanc/PACS remoto (valide antes de produção).
# Variáveis e deploy — consulte o README na raiz do repositório.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  orthanc:
    image: jodogne/orthanc-plugins:1.12.4
    restart: unless-stopped
    profiles:
      - local-pacs
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthanc:/var/lib/orthanc/db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://portal:portal@db:5432/portal
      JWT_SECRET: dev-change-this-to-a-long-random-string
      JWT_EXPIRES_SEC: "28800"
      WEB_ORIGIN: http://localhost:3000
      # Orthanc remoto (AE AIONPACS / DICOM na 4242) — DICOMweb via HTTP na porta 8042
      ORTHANC_DICOMWEB_ROOT: http://189.90.139.222:8042/dicom-web
      # Alinhe ao seed um estudo existente no PACS (ajuste o UID ou remova para o valor padrão do seed)
      SEED_STUDY_INSTANCE_UID: "1.2.276.0.7230010.3.1.2.0.29108.1775763951.440112"
    ports:
      - "3001:3000"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
        NEXT_PUBLIC_OHIF_BASE_PATH: /ohif
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_OHIF_BASE_PATH: /ohif
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  orthanc:
